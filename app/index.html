<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taste Finder — Discover places you'll love</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <h1>🍽️ Taste Finder</h1>
        <p class="tagline">Your taste. Discovered.</p>
      </div>

      <div class="setup-section">
        <h3>⚙️ Setup</h3>

        <div class="input-group">
          <label>Google Places API Key</label>
          <input type="password" id="places-key" placeholder="AIza..." autocomplete="off">
          <a href="https://console.cloud.google.com/google/maps-apis/credentials" target="_blank" class="help-link">Get one →</a>
        </div>

        <div class="input-group">
          <label>OpenRouter API Key</label>
          <input type="password" id="llm-key" placeholder="sk-or-..." autocomplete="off">
          <a href="https://openrouter.ai/keys" target="_blank" class="help-link">Get one →</a>
        </div>

        <div class="input-group">
          <label>LLM Model</label>
          <select id="llm-model">
            <option value="openai/gpt-4o-mini" selected>GPT-4o Mini (default)</option>
            <option value="google/gemini-flash-1.5">Gemini Flash</option>
            <option value="anthropic/claude-3.5-sonnet">Claude 3.5 Sonnet</option>
            <option value="z-ai/glm-4.5">GLM-4.5</option>
            <option value="meta-llama/llama-3.1-70b-instruct">Llama 3.1 70B</option>
          </select>
        </div>

        <div class="input-group">
          <label>Google Maps Export (JSON/KML/CSV)</label>
          <div id="drop-zone" class="drop-zone">
            <p>📎 Drop file or click to upload</p>
            <input type="file" id="file-input" accept=".json,.kml,.csv" hidden>
          </div>
          <p id="file-status" class="file-status"></p>
        </div>
      </div>

      <div class="profile-section" id="profile-section" style="display:none">
        <h3>🎯 Your Taste Profile</h3>
        <div id="profile-display"></div>
        <button id="rebuild-profile" class="btn-secondary">Rebuild Profile</button>
      </div>

      <!-- Selected places toolbar -->
      <div class="selection-section" id="selection-section" style="display:none">
        <h3>✅ Selected Places</h3>
        <p id="selection-count" class="selection-count">0 places selected</p>
        <div class="selection-actions">
          <button id="open-selected-maps" class="btn-secondary" disabled>🗺️ View on Maps</button>
          <button id="download-kml" class="btn-secondary" disabled>📥 KML</button>
          <button id="download-csv" class="btn-secondary" disabled>📋 CSV</button>
          <button id="clear-selection" class="btn-secondary">Clear</button>
        </div>
      </div>

      <div class="sidebar-footer">
        <button id="clear-chat" class="btn-secondary" style="width:100%;margin-bottom:8px">🗑️ Clear Chat</button>
        <p class="privacy">🔒 Keys stored only in your browser. No server.</p>
      </div>
    </aside>

    <!-- Main chat area -->
    <main id="main">
      <div id="chat-container">
        <div id="messages"></div>
        <div id="typing-indicator" style="display:none">
          <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        </div>
      </div>

      <div id="input-bar">
        <input type="text" id="chat-input" placeholder="Ask: 'Find fresh fish in Catania' or 'Craft beer bars in Berlin'" disabled>
        <button id="send-btn" disabled>Send</button>
      </div>
    </main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="config.js"></script>
  <script src="parser.js"></script>
  <script src="engine.js"></script>
  <script src="app.js"></script>
</body>
</html>
